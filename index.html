	<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>204 鐵捲門控制</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { font-family: -apple-system, system-ui; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f2f2f7; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 350px; text-align: center; }
        .btn { width: 100%; padding: 20px; margin: 10px 0; font-size: 20px; border: none; border-radius: 15px; cursor: pointer; color: white; font-weight: bold; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        #up { background: #34c759; } #stop { background: #ff3b30; } #down { background: #007aff; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f2f2f7; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lock-icon { font-size: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="lock-icon">🔒</div>
    <h2>系統已鎖定</h2>
    <p>請使用 Face ID 或指紋驗證</p>
    <button class="btn" style="background: #333; width: 200px;" onclick="authenticate()">點擊解鎖</button>
</div>

<div class="card">
    <h2>鐵捲門控制</h2>
    <button id="up" class="btn" onclick="trigger(1)">⇧ 捲門上升</button>
    <button id="stop" class="btn" onclick="trigger(2)">■ 停止動作</button>
    <button id="down" class="btn" onclick="trigger(3)">⇩ 捲門下降</button>
    <p id="status" style="color: #888; font-size: 12px; margin-top: 15px;">等待驗證...</p>
</div>

<script>
    // 1. Firebase 配置 (沿用你的設定)
    const firebaseConfig = {
        apiKey: "AIzaSyCjdDG7XRhJhRjhbFbrLkrW8-yDMc9vFKs",
        databaseURL: "https://esp32-autohome204-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. Face ID / 生物辨識核心邏輯
    async function authenticate() {
        if (!window.PublicKeyCredential) {
            alert("此設備不支援生物辨識，將直接進入控制模式");
            unlock();
            return;
        }

        try {
            // 這裡模擬一個 WebAuthn 請求來喚醒 iOS 原生驗證視窗
            const challenge = new Uint8Array(32);
            window.crypto.getRandomValues(challenge);
            const userId = new Uint8Array(16);
            window.crypto.getRandomValues(userId);

            const options = {
                publicKey: {
                    challenge: challenge,
                    rp: { name: "Home204 Control", id: window.location.hostname },
                    user: { id: userId, name: "owner", displayName: "屋主" },
                    pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                    authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                    timeout: 60000
                }
            };

            const credential = await navigator.credentials.create(options);
            if (credential) {
                unlock();
            }
        } catch (err) {
            console.error(err);
            alert("驗證取消或失敗：" + err.message);
        }
    }

    function unlock() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('status').innerText = "系統就緒";
    }

    // 3. 觸發繼電器
    function trigger(num) {
        const now = Date.now();
        const btns = document.querySelectorAll('.btn');
        btns.forEach(b => b.disabled = true);
        
        db.ref('/triggerRelay' + num).set(now)
            .then(() => {
                document.getElementById('status').innerText = "動作執行中...";
                setTimeout(() => {
                    btns.forEach(b => b.disabled = false);
                    document.getElementById('status').innerText = "系統就緒";
                }, 1500);
            })
            .catch(err => alert("連線錯誤: " + err));
    }
</script>
</body>
</html>
